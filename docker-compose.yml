version: "3.9"

services:
  # Caddy operates as the reverse proxy for accessing all services through tailscale.
  caddy:
    container_name: caddy
    image: caddy:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    # We need to explicitly indicate the env file so that we can populate the variables in the Caddyfile as well.
    env_file:
      - .env
    ports:
      - ${GHOST_REVERSE_PROXY_PORT}:${GHOST_REVERSE_PROXY_PORT}
      - ${FLAME_REVERSE_PROXY_PORT}:${FLAME_REVERSE_PROXY_PORT}
      - ${SYNCTHING_REVERSE_PROXY_PORT}:${SYNCTHING_REVERSE_PROXY_PORT}
      - ${IMMICH_REVERSE_PROXY}:${IMMICH_REVERSE_PROXY}
      - ${VAULTWARDEN_REVERSE_PROXY_PORT}:${VAULTWARDEN_REVERSE_PROXY_PORT}
      - ${RADICALE_REVERSE_PROXY_PORT}:${RADICALE_REVERSE_PROXY_PORT}
      - ${AGENDAV_REVERSE_PROXY_PORT}:${AGENDAV_REVERSE_PROXY_PORT}
      - ${NTFY_REVERSE_PROXY_PORT}:${NTFY_REVERSE_PROXY_PORT}
      - ${STIRLING_PDF_REVERSE_PROXY_PORT}:${STIRLING_PDF_REVERSE_PROXY_PORT}
      - ${PINGVIN_SHARE_REVERSE_PROXY_PORT}:${PINGVIN_SHARE_REVERSE_PROXY_PORT}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./tailscale/tmp/tailscaled.sock:/var/run/tailscale/tailscaled.sock
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Flame is the landing page to access catallenya-sev services that has an exposed a web interface.
  flame:
    container_name: flame
    image: pawelmalak/flame:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    volumes:
      - ${FLAME_VOLUME}:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    secrets:
      - password
    environment:
      - PASSWORD_FILE=/run/secrets/password
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Syncthing synchronizes files between multiple machines and catallenya-sev. This is used as a replacement for typical cloud storage software e.g. Google Drive. 
  syncthing:
    container_name: syncthing
    image: syncthing/syncthing:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${SYNCTHING_VOLUME}:/var/syncthing
    labels:
      - flame.type=application
      - flame.name=Syncthing
      - flame.url=${SYNCTHING_URL}
      - flame.icon=custom
      - com.centurylinklabs.watchtower.enable=true

  # Redis container used by Immich for photo service.
  redis:
    container_name: redis
    image: redis:alpine
    restart: unless-stopped
    networks:
      - caddy-internal
    command: redis-server --save "" --appendonly "no"
    tmpfs:
      - /var/lib/redis
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    volumes:
      - redis:/data
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Vaultwarden is a self-hosted password manager.
  vaultwarden:
    container_name: vaultwarden
    image: vaultwarden/server:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    volumes:
      - ${VAULTWARDEN_VOLUME}:/data
    labels:
      - flame.type=application
      - flame.name=Vaultwarden
      - flame.url=${VAULTWARDEN_URL}
      - flame.icon=custom
      - com.centurylinklabs.watchtower.enable=true

  # Radicale is a CalDAV and CardDAV server - used for contacts and calendar events.
  radicale:
    container_name: radicale
    image: tomsquest/docker-radicale:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - KILL
    volumes:
      - ${RADICALE_DATE_VOLUME}:/data
      - ${RADICALE_CONFIG_VOLUME}:/config:ro
    labels:
      - flame.type=application
      - flame.name=Radicale
      - flame.url=${RADICALE_URL}
      - flame.icon=custom
      - com.centurylinklabs.watchtower.enable=true

  # AgenDAV is a web interface for CalDAV, this is used in tandem with Radicale to support event scheduling.
  agendav:
    container_name: agendav
    image: ghcr.io/nagimov/agendav-docker:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    environment:
      - AGENDAV_SERVER_NAME=${AGENDAV_SERVER_NAME}
      - AGENDAV_TITLE=${AGENDAV_TITLE}
      - AGENDAV_FOOTER=${AGENDAV_FOOTER}
      - AGENDAV_ENC_KEY=${AGENDAV_ENC_KEY}
      - AGENDAV_CALDAV_SERVER=${AGENDAV_CALDAV_SERVER}
      - AGENDAV_CALDAV_PUBLIC_URL=${AGENDAV_URL}
      - AGENDAV_TIMEZONE=${AGENDAV_TIMEZONE}
      - AGENDAV_LANG=${AGENDAV_LANG}
      - AGENDAV_LOG_DIR=${AGENDAV_LOG_DIR}
    labels:
      - flame.type=application
      - flame.name=AgenDAV
      - flame.url=${AGENDAV_URL}
      - flame.icon=custom
      - com.centurylinklabs.watchtower.enable=true

  # Server component of Immich. 
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    networks:
      - caddy-internal
    command: [ "start.sh", "immich" ]
    env_file:
      - .env
    ports:
     - 2283:3001
    volumes:
      - ${IMMICH_VOLUME}:/usr/src/app/upload
    depends_on:
      - redis
      - database

  # Background jobs service component for Immich.
  immich-microservices:
    container_name: immich_microservices
    image: ghcr.io/immich-app/immich-server:release
    restart: unless-stopped
    networks:
      - caddy-internal
    # See: https://documentation.immich.app/docs/features/hardware-transcoding
    # extends:
    #   file: hwaccel.yml
    #   service: hwaccel
    command: [ "start.sh", "microservices" ]
    env_file:
      - .env
    volumes:
      - ${IMMICH_VOLUME}:/usr/src/app/upload
    depends_on:
      - redis
      - database

  # Facial recognition model for Immich. See: https://documentation.immich.app/docs/features/facial-recognition
  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:release
    restart: unless-stopped
    networks:
      - caddy-internal
    volumes:
      - model-cache:/cache

  # Database component of Immich. The specific image version is tagged to the example provided in Immich documentations. 
  database:
    container_name: immich_postgres
    image: tensorchord/pgvecto-rs:pg14-v0.1.11
    restart: unless-stopped
    networks:
      - caddy-internal
    environment:
      POSTGRES_HOST: ${DB_HOSTNAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data

  # Postgres backup service. This only targets the Immich database for now.
  pgbackups:
    container_name: pgbackups
    image: prodrigestivill/postgres-backup-local:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    environment:
      POSTGRES_HOST: ${DB_HOSTNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      SCHEDULE: ${PG_BACKUPS_SCHEDULE}
    volumes:
      - ${PG_BACKUPS_VOLUME}:/backups
      - ${DB_VOLUME}:/var/lib/postgresql/data
    depends_on:
      - database
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Tailscale is the mesh VPN proxy used for machines to access services hosted on catallenya-sev.
  tailscale:
    # This needs to be set to 'catallenya' as the certificates generated are associated with this name.
    hostname: catallenya
    container_name: tailscaled
    image: tailscale/tailscale:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /dev/net/tun:/dev/net/tun
      - ./tailscale/data:/var/lib
      # Adds volume for the tailscaled.sock so its present on the host system where caddy communicates with tailscale. See: https://github.com/tailscale/tailscale/issues/6849
      - ./tailscale/tmp:/tmp
    environment:
      # Persist the state in host and survives container reboot. See: https://github.com/tailscale/tailscale/issues/4913#issuecomment-1186402307
      - TS_STATE_DIR=/var/lib/tailscale
      # Use TS_AUTH_KEY on initial boot. This key will be persisted in var/lib/tailscale and can be removed on subsequent runs.
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Watchtower updates services located in this docker-compose to the target latest version.
  watchtower:
    container_name: watchtower
    image: containrrr/watchtower:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=ntfy://catallenya.kamori-mulley.ts.net:12111/catallenya-sev-watchtower
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_REMOVE_VOLUMES=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - com.centurylinklabs.watchtower.enable=true

  # Ghost is a blogging platform.
  ghost:
    container_name: ghost
    image: ghost:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    environment:
      - database__client=sqlite3
      - database__connection__filename=/var/lib/ghost/content/data/ghost.db
      - url=${PUBLIC_URL}
    volumes:
      - ${GHOST_VOLUME}:/var/lib/ghost/content
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Ntfy is our notification service that dispatches a message when a scheduled service is completed i.e. restic backup, or a service is updated i.e. watchtower update.
  ntfy:
    container_name: ntfy
    image: binwiederhier/ntfy
    restart: unless-stopped
    networks:
      - caddy-internal
    command:
      - serve
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy:/etc/ntfy
    labels:
      - flame.type=application
      - flame.name=ntfy
      - flame.url=${NTFY_URL}
      - flame.icon=custom
      - com.centurylinklabs.watchtower.enable=true

  # Stirling is a PDF modification service.
  stirling-pdf:
    container_name: stirling-pdf
    image: frooodle/s-pdf:latest
    restart: unless-stopped
    networks:
      - caddy-internal
    labels:
      - flame.type=application
      - flame.name=StirlingPDF
      - flame.url=${STIRLING_PDF_URL}
      - flame.icon=custom
      - com.centurylinklabs.watchtower.enable=true

  # Cloudflared is our proxy for exposing Docker services to the internet. 
  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared
    restart: unless-stopped
    networks:
      - caddy-internal
    command: tunnel -credentials-file /run/secrets/cloudflared-token run catallenya-sev
    secrets:
      - cloudflared-token
    labels:
      - com.centurylinklabs.watchtower.enable=true

  # Pingvin-share is a file-sharing platform.
  pingvin-share:
    container_name: pingvin-share
    image: stonith404/pingvin-share
    restart: unless-stopped
    networks:
      - caddy-internal
    volumes:
      - ${PINGVIN_SHARE_DATA_VOLUME}:/opt/app/backend/data
      - ${PINGVIN_SHARE_IMAGES_VOLUME}:/opt/app/frontend/public/img
    labels:
      - com.centurylinklabs.watchtower.enable=true

secrets:
  password:
    file: flame/token.json
  cloudflared-token:
    file: cloudflared/token.json

volumes:
  redis:
  model-cache:
  ntfy:
  ntfy-cache:

networks:
  caddy-internal:
    external: false
